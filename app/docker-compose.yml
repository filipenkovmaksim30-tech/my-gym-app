version: '3.8'

services:
  web:
    build: .
    container_name: gym_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    env_file:
      - .env
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis_cache
    networks:
      - gym_network

  db:
    image: postgres:15-alpine
    container_name: gym_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gym_network

  redis_cache:
    image: redis:7.2-alpine
    container_name: gym_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gym_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gym_frontend
    ports:
      - "3000:80"
    depends_on:
      - web
    networks:
      - gym_network

volumes:
  postgres_data:
  redis_data:

networks:
  gym_network:
    driver: bridge