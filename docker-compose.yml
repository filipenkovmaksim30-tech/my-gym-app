version: '3.8'

services:
  # 1. Главный бэкенд сервис (FastAPI)
  web:
    build: 
      context: ./services/main_service
      dockerfile: Dockerfile
    container_name: gym_backend
    ports:
      - "8000:8000"
    volumes:
      - ./services/main_service:/code
    env_file:
      - .env
    command: gunicorn app.backend.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120
    depends_on:
      db:
        condition: service_started
      redis_cache:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - gym_network

  # 2. База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: gym_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gym_network

  # 3. Кэш Redis
  redis_cache:
    image: redis:7.2-alpine
    container_name: gym_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gym_network

  # 4. Фронтенд React
  frontend:
    build:
      context: ./services/main_service/app/frontend
      dockerfile: Dockerfile
    container_name: gym_frontend
    ports:
      - "3000:80"
    depends_on:
      - web
    networks:
      - gym_network

  # 5. Брокер сообщений RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gym_rabbitmq
    restart: always
    ports:
      - "5672:5672"  
      - "15672:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gym_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5672"]
      interval: 3s
      timeout: 3s
      retries: 10

  # 6. Сервис Отчетов (Воркер TaskIQ)
  reports_service:
    build:
      context: ./services/reports_service
      dockerfile: Dockerfile
    container_name: gym_reports
    restart: always
    command: taskiq worker app.scheduler:broker
    env_file:
      - .env
    volumes:
      - shared_reports:/tmp
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_started
    networks:
      - gym_network

  # 7. Сервис Уведомлений
  notification_service:
    build:
      context: ./services/notification_service
      dockerfile: Dockerfile
    container_name: gym_notifications
    restart: always
    command: python app/main.py
    env_file:
      - .env
    volumes:
      - shared_reports:/tmp
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - gym_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  shared_reports:

networks:
  gym_network:
    driver: bridge